<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Between Feelings: AI Chat</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="app-shell">

  <header class="top-bar">
    <button class="icon-btn" id="menuBtn" type="button">
      <span class="hamburger"></span>
    </button>
    <h1 class="app-title">Between Feelings</h1>
    <div class="header-spacer"></div>
  </header>

  <nav class="drawer" id="drawer">
    <ul>
      <li><a href="logs.html">View Logs</a></li>
      <li><a href="new_log.html">New Log</a></li>
      <li><a href="patterns.html">Patterns</a></li>
      <li><a href="chat.html" class="active">AI Chat</a></li>
    </ul>
  </nav>
  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <main class="log-page log-form-page">

    <section class="log-card page active" id="chatPage">

        <p class="section-label">ONE TURN</p>
        <h2>AI Chat</h2>

        <div class="question-box" style="margin-bottom: 12px;">
          <p class="question-title" style="color: var(--text);">
            Ask me anything about your logs.
          </p>
        </div>

        <label for="userInput">Message</label>
        <textarea id="userInput" placeholder="Type your message..."></textarea>

        <div class="bottom-area" style="margin-top: 14px;">
          <button class="main-btn" id="sendBtn" type="button">Send</button>
        </div>

        <label for="outputBox" style="margin-top: 18px;">AI Response</label>
        <div class="question-box" id="outputBox">
          <p id="outputText">
            Response will appear here.
          </p>
        </div>

    </section>

  </main>

</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const drawer = document.getElementById("drawer");
const backdrop = document.getElementById("drawerBackdrop");

menuBtn.onclick = () => {
  drawer.classList.add("open");
  backdrop.classList.add("show");
};

backdrop.onclick = () => {
  drawer.classList.remove("open");
  backdrop.classList.remove("show");
};

const sendBtn = document.getElementById("sendBtn");
const input = document.getElementById("userInput");
const outputText = document.getElementById("outputText");
const apiBaseUrl = "http://127.0.0.1:5000";
const currentUserId = sessionStorage.getItem("currentUserId");

if (!currentUserId) {
  // this prevents unauthenticated navigation in the UI, but backend
  // validation is still required because sessionStorage cannot be trusted.
  window.location.href = "authentication.html";
} else {
  sendBtn.onclick = async () => {
    const text = input.value.trim();

    if (!text) {
      outputText.textContent = "Please enter a message first.";
      return;
    }

    outputText.style.color = "var(--text)";
    outputText.textContent = "Generating response...";

    try {
      const response = await fetch(`${apiBaseUrl}/chat/${currentUserId}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ chat_input: text }),
      });

      let data = null;
      try {
        data = await response.json();
      } catch (_) {
        data = null;
      }

      if (!response.ok) {
        const message = data && data.message
          ? data.message
          : "Unable to generate a response right now.";
        outputText.textContent = message;
        return;
      }

      outputText.textContent = data && data.reply
        ? data.reply
        : "No response was returned.";
    } catch (error) {
      outputText.textContent = "Unable to reach the server. Please try again.";
    }
  };
}
</script>

</body>
</html>
