<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LLM Chat</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="app-shell">

  <header class="top-bar">
    <button class="icon-btn" id="menuBtn" type="button">
      <span class="hamburger"></span>
    </button>
    <h1 class="app-title">Between Feelings</h1>
    <div class="header-spacer"></div>
  </header>

  <nav class="drawer" id="drawer">
    <ul>
      <li><a href="logs.html">View Logs</a></li>
      <li><a href="new_log.html">New Log</a></li>
      <li><a href="patterns.html">Patterns</a></li>
      <li><a href="chat.html" class="active">LLM Chat</a></li>
    </ul>
  </nav>
  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <main class="log-page log-form-page">

    <div style="display: flex; justify-content: center; width: 100%; padding: 10px;">

      <section class="log-card page active" id="chatPage" style="max-width: 360px; width: 100%;">

        <p class="section-label">ONE TURN</p>
        <h2>LLM Chat</h2>

        <div class="question-box" style="margin-bottom: 12px;">
          <p class="question-title" style="text-align: center; color: var(--text);">
            Ask me anything about your emotions
          </p>
        </div>

        <label for="userInput">username</label>
        <textarea id="userInput" placeholder="Type your message..."></textarea>

        <div class="bottom-area" style="margin-top: 14px;">
          <button class="main-btn" id="sendBtn" type="button">Send</button>
        </div>

        <label for="outputBox" style="margin-top: 18px;">LLM</label>
        <div class="question-box" id="outputBox">
          <p id="outputText">
            Response will appear here.
          </p>
        </div>

      </section>

    </div>

  </main>

</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const drawer = document.getElementById("drawer");
const backdrop = document.getElementById("drawerBackdrop");

menuBtn.onclick = () => {
  drawer.classList.add("open");
  backdrop.classList.add("show");
};

backdrop.onclick = () => {
  drawer.classList.remove("open");
  backdrop.classList.remove("show");
};

const sendBtn = document.getElementById("sendBtn");
const input = document.getElementById("userInput");
const outputText = document.getElementById("outputText");

sendBtn.onclick = () => {
  const text = input.value.trim();

  if (!text) {
    outputText.textContent = "Please enter a message first.";
    return;
  }

  let reply = "This response is based only on your current input.";

  if (text.toLowerCase().includes("stress")) {
    reply = "It sounds like stress may be affecting you right now.";
  } 
  else if (text.toLowerCase().includes("sad")) {
    reply = "It sounds like you may be feeling low right now.";
  } 
  else if (text.toLowerCase().includes("angry")) {
    reply = "It sounds like something may have crossed your boundary.";
  } 
  else if (text.toLowerCase().includes("happy")) {
    reply = "That sounds like a positive moment.";
  }

  outputText.style.color = "var(--text)";
  outputText.textContent = reply;
};
</script>

</body>
</html>
