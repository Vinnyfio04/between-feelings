<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Between Feelings: Patterns</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="app-shell">

  <!-- Header -->
  <header class="top-bar">
    <button class="icon-btn" id="menuBtn" type="button" aria-label="Open menu">
      <span class="hamburger"></span>
    </button>
    <h1 class="app-title">Between Feelings</h1>
    <div class="header-spacer"></div>
  </header>

  <!-- Drawer -->
  <nav class="drawer" id="drawer">
    <ul>
      <li><a href="logs.html">View Logs</a></li>
      <li><a href="new_log.html">New Log</a></li>
      <li><a href="patterns.html" class="active">Patterns</a></li>
      <li><a href="chat.html">AI Chat</a></li>
    </ul>
  </nav>
  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <!-- Main -->
  <main class="patterns-page">
    <p id="patternsStatus" class="section-label" aria-live="polite" style="font-size: 1.5rem; text-align: center; margin: 2.5rem 0;"></p>

    <section class="hero-card patterns-content hidden">
      <p class="section-label">WEEKLY REFLECTION</p>
      <h2>Your emotional patterns</h2>
      <p id="heroSummary"></p>
    </section>

    <section class="summary-card patterns-content hidden">
      <div class="summary-header">
        <h3>Short Summary</h3>
        <span class="badge">
          <img src="logo.svg" class="badge-icon" alt="AI insight icon">
        </span>
      </div>

      <div class="summary-box" id="shortSummary"></div>
    </section>

    <section class="insight-card patterns-content hidden">
      <h3>Quick Insights</h3>
      <div id="quickInsights"></div>
    </section>

    <section class="dropdown-card patterns-content hidden">
      <button id="toggleBtn" class="dropdown-btn" type="button">
        View Detailed Summary ▼
      </button>

      <div id="dropdownContent" class="dropdown-content">
        <p id="detailedSummary"></p>
      </div>
    </section>

  </main>

</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const drawer = document.getElementById("drawer");
const backdrop = document.getElementById("drawerBackdrop");

menuBtn.onclick = () => {
  drawer.classList.add("open");
  backdrop.classList.add("show");
};

backdrop.onclick = () => {
  drawer.classList.remove("open");
  backdrop.classList.remove("show");
};

const toggleBtn = document.getElementById("toggleBtn");
const content = document.getElementById("dropdownContent");

toggleBtn.onclick = () => {
  content.classList.toggle("open");
};

const apiBaseUrl = "http://127.0.0.1:5000"; // Base URL for the API (local for now)
const currentUserId = sessionStorage.getItem("currentUserId") // Get the user id from the session storage

if (!currentUserId) {
  // client redirect keeps navigation coherent; authorization still belongs
  // to backend routes because browser storage can be modified by users.
  window.location.href = "authentication.html";
} else {
  const patternsStatus = document.getElementById("patternsStatus");
  const heroSummary = document.getElementById("heroSummary");
  const shortSummary = document.getElementById("shortSummary");
  const quickInsights = document.getElementById("quickInsights");
  const detailedSummary = document.getElementById("detailedSummary");
  const patternSections = document.querySelectorAll(".patterns-content");

  function isBlank(value) {
    return !value || !String(value).trim();
  }

  function setFallbackContent() {
    heroSummary.textContent = "We need a little more recent logging data before we can show reliable patterns.";
    shortSummary.textContent = "Keep adding a few emotion logs across different days to unlock a clearer summary.";
    quickInsights.innerHTML = "";
    const insight = document.createElement("div");
    insight.className = "insight";
    insight.innerHTML = "<span></span> Add a few more entries to generate insights.";
    quickInsights.appendChild(insight);
    detailedSummary.textContent = "Once more logs are available, your detailed emotional pattern summary will appear here.";
  }

  function renderError() {
    patternSections.forEach((section) => section.classList.add("hidden"));
    patternsStatus.textContent = "Unable to load patterns right now.";
    setFallbackContent();
  }

  function renderEmpty() {
    patternSections.forEach((section) => section.classList.add("hidden"));
    patternsStatus.textContent = "Not enough data yet to generate patterns.";
    setFallbackContent();
  }

  function renderPatterns(data) {
    const hero = data.hero_summary;
    const short = data.short_summary;
    const detailed = data.detailed_summary;
    const insights = Array.isArray(data.quick_insights)
      ? data.quick_insights.filter((item) => !isBlank(item))
      : [];

    if (isBlank(hero) || isBlank(short) || isBlank(detailed) || insights.length === 0) {
      renderEmpty();
      return;
    }

    patternSections.forEach((section) => section.classList.remove("hidden"));
    heroSummary.textContent = hero.trim();
    shortSummary.textContent = short.trim();
    detailedSummary.textContent = detailed.trim();

    quickInsights.innerHTML = "";
    insights.forEach((item) => {
      const insight = document.createElement("div");
      insight.className = "insight";
      insight.innerHTML = "<span></span>";
      insight.append(document.createTextNode(" " + item.trim()));
      quickInsights.appendChild(insight);
    });

    patternsStatus.textContent = "";
  }

  async function loadPatterns() {
    try {
      const response = await fetch(`${apiBaseUrl}/patterns/${currentUserId}`);
      const data = await response.json();

      console.log(data);

      if (response.status === 202) {
        // `/patterns` is asynchronous. 202 means generation is in progress,
        // so polling is expected behavior rather than a failure path.
        patternSections.forEach((section) => section.classList.add("hidden"));
        patternsStatus.textContent = "Generating pattern summary...";
        setTimeout(loadPatterns, 1500);
        return;
      }

      if (response.status === 200) {
        renderPatterns(data);
        return;
      }

      if (response.status === 502) {
        patternsStatus.textContent = "Pattern generation failed. Please try again later.";
        console.error(data.message)
        
        setFallbackContent();
        return;
      }

      renderError();
    } catch (error) {
      renderError();
    }
  }

  window.addEventListener("load", loadPatterns);
}
</script>

</body>
</html>
