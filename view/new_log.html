<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Between Feelings: New Log</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="app-shell">

  <!-- Header -->
  <header class="top-bar">
    <button class="icon-btn" id="menuBtn" type="button">
      <span class="hamburger"></span>
    </button>
    <h1 class="app-title">Between Feelings</h1>
    <div class="header-spacer"></div>
  </header>

  <!-- Drawer -->
  <nav class="drawer" id="drawer">
    <ul>
      <li><a href="logs.html">View Logs</a></li>
      <li><a href="new_log.html" class="active">New Log</a></li>
      <li><a href="patterns.html">Patterns</a></li>
      <li><a href="chat.html">AI Chat</a></li>
    </ul>
  </nav>
  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <!-- Main -->
  <main class="log-page log-form-page">

    <!-- Page 1 -->
    <section class="log-card page active" id="page1">
      <p class="section-label">EMOTION ENTRY</p>
      <h2>New Log</h2>

      <label>Talk about your experience.</label>
      <textarea id="descriptionInput" placeholder="Type here..."></textarea>

      <label>How would you describe how it made you feel?</label>
      <input id="labelInput" type="text" placeholder="e.g. excited, angry, stressed..." />

      <label>What do you think caused that feeling?</label>
      <input id="triggerInput" type="text" placeholder="e.g. schoolwork, criticism..." />

      <label>Intensity</label>
      <div class="slider-wrap">
        <input id="intensityInput" type="range" min="1" max="5" value="3" />
        <div class="range-marks">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="range-labels numbers">
          <span>1</span><span> </span><span> </span><span> </span><span>5</span>
        </div>
      </div>

      <label>Sleep Quality</label>
      <div class="slider-wrap">
        <input id="sleepInput" type="range" min="1" max="3" value="2" />
        <div class="range-labels three-text">
          <span>Poor</span>
          <span>Average</span>
          <span>Good</span>
        </div>
      </div>

      <div class="bottom-area">
        <button class="main-btn" id="nextBtn">Next</button>
        <p class="step-text" id="stepText">1 / 4</p>
      </div>
    </section>

    <!-- Page 2 -->
    <section class="log-card page" id="page2">
      <p class="section-label">FOLLOW-UP</p>
      <h2>Let’s ask some quick follow-ups.</h2>

      <div class="question-box">
        <p class="question-title" id="questionTitle">Q1:</p>
        <p class="question-text" id="questionText"></p>
      </div>

      <textarea id="followupResponseInput" placeholder="Type your response here..."></textarea>

      <div class="followup-actions">
        <button class="sub-btn" id="backBtn">Back</button>
        <button class="main-btn small" id="followupNextBtn">Next</button>
      </div>
    </section>

  </main>

</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const drawer = document.getElementById("drawer");
const backdrop = document.getElementById("drawerBackdrop");

menuBtn.onclick = () => {
  drawer.classList.add("open");
  backdrop.classList.add("show");
};

backdrop.onclick = () => {
  drawer.classList.remove("open");
  backdrop.classList.remove("show");
};

const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");
const descriptionInput = document.getElementById("descriptionInput");
const labelInput = document.getElementById("labelInput");
const triggerInput = document.getElementById("triggerInput");
const intensityInput = document.getElementById("intensityInput");
const sleepInput = document.getElementById("sleepInput");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const followupNextBtn = document.getElementById("followupNextBtn");
const stepText = document.getElementById("stepText");
const questionTitle = document.getElementById("questionTitle");
const questionText = document.getElementById("questionText");
const followupResponseInput = document.getElementById("followupResponseInput");
const apiBaseUrl = "http://127.0.0.1:5000";
const currentUserId = sessionStorage.getItem("currentUserId");

const state = {
  initialLogPayload: null,
  questions: [],
  answers: [],
  currentQuestionIndex: 0
};

let isGeneratingFollowups = false;
let isSubmittingFinalLog = false;

if (!currentUserId) {
  // REF(HCDD-311): this client redirect keeps navigation coherent, but server-side
  // ownership checks are still required because sessionStorage is user-editable.
  window.location.href = "authentication.html";
}

// Contract for later backend wiring: slider values map to stored labels.
function mapSleepValueToLabel(value) {
  if (String(value) === "1") return "Poor";
  if (String(value) === "3") return "Good";
  return "Average";
}

sleepInput.dataset.sleepLabel = mapSleepValueToLabel(sleepInput.value);
sleepInput.addEventListener("input", () => {
  sleepInput.dataset.sleepLabel = mapSleepValueToLabel(sleepInput.value);
});

function setPage1Loading(isLoading) {
  nextBtn.disabled = isLoading;
  nextBtn.textContent = isLoading ? "Loading..." : "Next";
}

function setPage2Loading(isLoading) {
  backBtn.disabled = isLoading;
  followupNextBtn.disabled = isLoading;
  if (isLoading) {
    followupNextBtn.textContent = "Submitting...";
    return;
  }
  followupNextBtn.textContent = state.currentQuestionIndex === 2 ? "Submit" : "Next";
}

function renderFollowupStep() {
  const index = state.currentQuestionIndex;
  questionTitle.textContent = `Q${index + 1}:`;
  questionText.textContent = state.questions[index] || "";
  followupResponseInput.value = state.answers[index] || "";
  followupNextBtn.textContent = index === 2 ? "Submit" : "Next";
  stepText.textContent = `${index + 2} / 4`;
}

function buildInitialPayload() {
  return {
    // TODO(HCDD-312): replace timestamp-based client IDs with server-generated IDs
    // once the create-log API no longer requires frontend-provided log_id.
    log_id: Date.now(),
    label: labelInput.value.trim(),
    description: descriptionInput.value.trim(),
    date: new Date().toISOString(),
    trigger: triggerInput.value.trim(),
    intensity: Number(intensityInput.value),
    sleep_quality: mapSleepValueToLabel(sleepInput.value)
  };
}

function buildFollowUpQaString() {
  // REF(HCDD-313): backend currently persists follow-up data as a single formatted
  // string; preserve this layout until both layers migrate to structured JSON.
  return [
    `Q1: ${state.questions[0] || ""}`,
    `A1: ${state.answers[0] || ""}`,
    "",
    `Q2: ${state.questions[1] || ""}`,
    `A2: ${state.answers[1] || ""}`,
    "",
    `Q3: ${state.questions[2] || ""}`,
    `A3: ${state.answers[2] || ""}`
  ].join("\n");
}

async function handleInitialNext() {
  if (isGeneratingFollowups || isSubmittingFinalLog) return;

  const description = descriptionInput.value.trim();
  const label = labelInput.value.trim();
  const trigger = triggerInput.value.trim();
  if (!description || !label || !trigger) {
    alert("Please complete description, feeling label, and trigger before continuing.");
    return;
  }

  const initialPayload = buildInitialPayload();

  isGeneratingFollowups = true;
  setPage1Loading(true);
  try {
    // First phase: send base log fields to generate contextual follow-up questions
    // before committing the final log entry.
    const response = await fetch(`${apiBaseUrl}/logs/${encodeURIComponent(currentUserId)}/followup-questions`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(initialPayload)
    });
    if (!response.ok) {
      throw new Error("Could not generate follow-up questions.");
    }
    const data = await response.json();
    const questions = Array.isArray(data.questions) ? data.questions : [];
    // REF(HCDD-314): UI flow has three follow-up pages, so this guard fails fast
    // when model output drifts from the expected 3-question contract.
    if (questions.length !== 3 || questions.some((q) => typeof q !== "string" || !q.trim())) {
      throw new Error("Follow-up questions were not returned in the expected format.");
    }

    state.initialLogPayload = initialPayload;
    state.questions = questions;
    state.answers = ["", "", ""];
    state.currentQuestionIndex = 0;

    renderFollowupStep();
    page1.classList.remove("active");
    page2.classList.add("active");
  } catch (error) {
    console.error(error);
    alert("Unable to generate follow-up questions right now. Please try again.");
  } finally {
    isGeneratingFollowups = false;
    setPage1Loading(false);
  }
}

async function submitFinalLog() {
  if (!state.initialLogPayload) {
    alert("Missing initial log details. Please start again from page 1.");
    page2.classList.remove("active");
    page1.classList.add("active");
    return;
  }

  isSubmittingFinalLog = true;
  setPage2Loading(true);
  try {
    // Second phase: submit the original log fields plus user follow-up answers.
    const payload = {
      ...state.initialLogPayload,
      follow_up_qa: buildFollowUpQaString()
    };
    const response = await fetch(`${apiBaseUrl}/logs/${encodeURIComponent(currentUserId)}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });
    if (!response.ok) {
      throw new Error("Could not save log.");
    }
    alert("Log saved successfully.");
    window.location.href = "logs.html";
  } catch (error) {
    console.error(error);
    alert("Unable to save this log right now. Please try again.");
  } finally {
    isSubmittingFinalLog = false;
    setPage2Loading(false);
  }
}

async function handleFollowupNext() {
  if (isSubmittingFinalLog || isGeneratingFollowups) return;

  state.answers[state.currentQuestionIndex] = followupResponseInput.value.trim();
  if (state.currentQuestionIndex < 2) {
    state.currentQuestionIndex += 1;
    renderFollowupStep();
    return;
  }
  await submitFinalLog();
}

function handleFollowupBack() {
  if (isSubmittingFinalLog || isGeneratingFollowups) return;

  state.answers[state.currentQuestionIndex] = followupResponseInput.value.trim();
  if (state.currentQuestionIndex > 0) {
    state.currentQuestionIndex -= 1;
    renderFollowupStep();
    return;
  }
  page2.classList.remove("active");
  page1.classList.add("active");
  stepText.textContent = "1 / 4";
}

nextBtn.addEventListener("click", handleInitialNext);
followupNextBtn.addEventListener("click", handleFollowupNext);
backBtn.addEventListener("click", handleFollowupBack);
</script>

</body>
</html>
